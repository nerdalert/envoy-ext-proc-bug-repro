apiVersion: v1
kind: Namespace
metadata:
  name: extproc-repro
---
# ext_proc service 1 (simulates header-only filter, like the second filter in chain)
# No delay - responds immediately to headers
apiVersion: apps/v1
kind: Deployment
metadata:
  name: extproc1
  namespace: extproc-repro
spec:
  replicas: 1
  selector:
    matchLabels:
      app: extproc1
  template:
    metadata:
      labels:
        app: extproc1
    spec:
      containers:
      - name: extproc
        image: extproc-repro:latest
        imagePullPolicy: IfNotPresent
        args: ["-name", "extproc1-hdr-only"]
        ports:
        - containerPort: 9902
---
apiVersion: v1
kind: Service
metadata:
  name: extproc1
  namespace: extproc-repro
spec:
  selector:
    app: extproc1
  ports:
  - name: grpc
    port: 9902
    targetPort: 9902
---
# ext_proc service 2 (simulates body-processing filter, like BBR >= 1.3)
# Delays ALL body chunk responses to create the EoS race window
apiVersion: apps/v1
kind: Deployment
metadata:
  name: extproc2
  namespace: extproc-repro
spec:
  replicas: 1
  selector:
    matchLabels:
      app: extproc2
  template:
    metadata:
      labels:
        app: extproc2
    spec:
      containers:
      - name: extproc
        image: extproc-repro:latest
        imagePullPolicy: IfNotPresent
        args: ["-name", "extproc2-body"]
        ports:
        - containerPort: 9902
---
apiVersion: v1
kind: Service
metadata:
  name: extproc2
  namespace: extproc-repro
spec:
  selector:
    app: extproc2
  ports:
  - name: grpc
    port: 9902
    targetPort: 9902
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: echo
  namespace: extproc-repro
spec:
  replicas: 1
  selector:
    matchLabels:
      app: echo
  template:
    metadata:
      labels:
        app: echo
    spec:
      containers:
      - name: echo
        image: echo-repro:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: echo
  namespace: extproc-repro
spec:
  selector:
    app: echo
  ports:
  - name: http
    port: 8080
    targetPort: 8080
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: envoy-config
  namespace: extproc-repro
data:
  envoy.yaml: |
    admin:
      address:
        socket_address:
          address: 0.0.0.0
          port_value: 19000
    static_resources:
      listeners:
        - name: listener_0
          address:
            socket_address:
              address: 0.0.0.0
              port_value: 10000
          filter_chains:
            - filters:
                - name: envoy.filters.network.http_connection_manager
                  typed_config:
                    "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                    stat_prefix: ingress_http
                    codec_type: AUTO
                    access_log:
                      - name: envoy.access_loggers.stdout
                        typed_config:
                          "@type": type.googleapis.com/envoy.extensions.access_loggers.stream.v3.StdoutAccessLog
                          log_format:
                            text_format: "[%START_TIME%] %RESPONSE_CODE% UPSTREAM_WIRE_BYTES_RECEIVED:%UPSTREAM_WIRE_BYTES_RECEIVED% DOWNSTREAM_WIRE_BYTES_SENT:%DOWNSTREAM_WIRE_BYTES_SENT%\n"
                    route_config:
                      name: local_route
                      virtual_hosts:
                        - name: local_service
                          domains: ["*"]
                          routes:
                            - match:
                                prefix: "/"
                              route:
                                cluster: echo
                    http_filters:
                      # Filter-0 (first in config): processes response body in FULL_DUPLEX_STREAMED
                      # For responses, this filter is SECOND to process (further from upstream)
                      # Matches the upstream test: body-processing filter sees response first
                      # because response direction is reverse of config order.
                      #
                      # Actually: response direction goes router -> last filter -> ... -> first filter
                      # So ext_proc_cluster_2 (second in config) processes response FIRST.
                      - name: envoy.filters.http.ext_proc
                        typed_config:
                          "@type": type.googleapis.com/envoy.extensions.filters.http.ext_proc.v3.ExternalProcessor
                          failure_mode_allow: false
                          message_timeout: 300s
                          allow_mode_override: true
                          processing_mode:
                            request_header_mode: SKIP
                            response_header_mode: SEND
                            request_body_mode: NONE
                            response_body_mode: NONE
                            request_trailer_mode: SKIP
                            response_trailer_mode: SKIP
                          grpc_service:
                            envoy_grpc:
                              cluster_name: ext_proc_cluster_1
                      # Filter-1 (second in config): processes response body
                      # For responses, this filter processes FIRST (closer to upstream)
                      - name: envoy.filters.http.ext_proc
                        typed_config:
                          "@type": type.googleapis.com/envoy.extensions.filters.http.ext_proc.v3.ExternalProcessor
                          failure_mode_allow: false
                          message_timeout: 300s
                          allow_mode_override: true
                          processing_mode:
                            request_header_mode: SKIP
                            response_header_mode: SEND
                            request_body_mode: NONE
                            response_body_mode: FULL_DUPLEX_STREAMED
                            request_trailer_mode: SKIP
                            response_trailer_mode: SEND
                          grpc_service:
                            envoy_grpc:
                              cluster_name: ext_proc_cluster_2
                      - name: envoy.filters.http.router
                        typed_config:
                          "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
      clusters:
        - name: echo
          type: STRICT_DNS
          connect_timeout: 2s
          lb_policy: ROUND_ROBIN
          load_assignment:
            cluster_name: echo
            endpoints:
              - lb_endpoints:
                  - endpoint:
                      address:
                        socket_address:
                          address: echo.extproc-repro.svc.cluster.local
                          port_value: 8080
        - name: ext_proc_cluster_1
          type: STRICT_DNS
          connect_timeout: 2s
          http2_protocol_options: {}
          lb_policy: ROUND_ROBIN
          load_assignment:
            cluster_name: ext_proc_cluster_1
            endpoints:
              - lb_endpoints:
                  - endpoint:
                      address:
                        socket_address:
                          address: extproc1.extproc-repro.svc.cluster.local
                          port_value: 9902
        - name: ext_proc_cluster_2
          type: STRICT_DNS
          connect_timeout: 2s
          http2_protocol_options: {}
          lb_policy: ROUND_ROBIN
          load_assignment:
            cluster_name: ext_proc_cluster_2
            endpoints:
              - lb_endpoints:
                  - endpoint:
                      address:
                        socket_address:
                          address: extproc2.extproc-repro.svc.cluster.local
                          port_value: 9902
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: envoy
  namespace: extproc-repro
spec:
  replicas: 1
  selector:
    matchLabels:
      app: envoy
  template:
    metadata:
      labels:
        app: envoy
    spec:
      containers:
      - name: envoy
        image: docker.io/istio/proxyv2:1.28.1
        command: ["/usr/local/bin/envoy"]
        args: ["-c", "/etc/envoy/envoy.yaml", "-l", "debug"]
        ports:
        - containerPort: 10000
        - containerPort: 19000
        volumeMounts:
        - name: config
          mountPath: /etc/envoy
      volumes:
      - name: config
        configMap:
          name: envoy-config
---
apiVersion: v1
kind: Service
metadata:
  name: envoy
  namespace: extproc-repro
spec:
  type: NodePort
  selector:
    app: envoy
  ports:
  - name: http
    port: 10000
    targetPort: 10000
